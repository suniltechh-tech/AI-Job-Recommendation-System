<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AI Dashboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:
    linear-gradient(135deg,#0f172a,#1e293b,#7c3aed);

    min-height:100vh;

    padding:40px;

    color:white;
}

.dashboard-title{

    font-size:40px;

    margin-bottom:30px;

    font-weight:700;
}

.dashboard-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:25px;
}

.card{

    background:rgba(255,255,255,0.1);

    backdrop-filter:blur(12px);

    border-radius:25px;

    padding:30px;

    border:1px solid rgba(255,255,255,0.2);

    transition:0.3s;
}

.card:hover{

    transform:translateY(-8px);

    box-shadow:0 0 20px rgba(124,58,237,0.5);
}

.card i{

    font-size:35px;

    margin-bottom:20px;

    color:#c084fc;
}

.card h2{

    font-size:32px;

    margin-bottom:10px;
}

.card p{

    color:#e2e8f0;
}

.chart-box{

    margin-top:40px;

    background:rgba(255,255,255,0.1);

    padding:30px;

    border-radius:25px;

    backdrop-filter:blur(12px);
}

</style>

</head>

<body>

<h1 class="dashboard-title">

    AI Job Recommendation Dashboard

</h1>

<div class="dashboard-grid">

    <div class="card">

        <i class="fa-solid fa-user"></i>

        <h2>120</h2>

        <p>Total Users</p>

    </div>

    <div class="card">

        <i class="fa-solid fa-file"></i>

        <h2>85</h2>

        <p>Uploaded Resumes</p>

    </div>

    <div class="card">

        <i class="fa-solid fa-briefcase"></i>

        <h2>240</h2>

        <p>Recommended Jobs</p>

    </div>

    <div class="card">

        <i class="fa-solid fa-chart-line"></i>

        <h2>92%</h2>

        <p>Recommendation Accuracy</p>

    </div>

</div>

<div class="chart-box">

    <h2>Trending Skills</h2>

    <br>

    <p>
        Python • Machine Learning • SQL • Flask • Data Science
    </p>

</div>

</body>
</html>
